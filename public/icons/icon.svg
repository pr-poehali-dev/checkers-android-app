<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d0f1a"/>
  <!-- Board pattern hint -->
  <rect x="80" y="80" width="352" height="352" rx="32" fill="#1a1f35"/>
  <!-- Board cells (2x2 sample pattern) -->
  <rect x="80" y="80" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="256" y="80" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="344" y="168" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="168" y="168" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="80" y="256" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="256" y="256" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="168" y="344" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <rect x="344" y="344" width="88" height="88" rx="8" fill="#2a1a0a" opacity="0.8"/>
  <!-- White piece -->
  <circle cx="212" cy="300" r="52" fill="url(#wg)"/>
  <circle cx="212" cy="300" r="52" fill="none" stroke="#f5c842" stroke-width="4" opacity="0.8"/>
  <!-- Black piece -->
  <circle cx="300" cy="212" r="52" fill="url(#bg)"/>
  <circle cx="300" cy="212" r="52" fill="none" stroke="#555" stroke-width="4" opacity="0.8"/>
  <!-- Orange accent ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#og)" stroke-width="6" opacity="0.4"/>
  <defs>
    <radialGradient id="wg" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <radialGradient id="bg" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
</svg>
